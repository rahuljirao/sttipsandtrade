<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>ST Tips</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #7b2cff;
        --primary-light: #a855f7;
        --primary-dim: rgba(123, 44, 255, 0.15);
        --bg: #080810;
        --card-bg: rgba(255, 255, 255, 0.03);
        --border: rgba(123, 44, 255, 0.25);
        --text: #ffffff;
        --muted: #888;
        --neon: 0 0 18px rgba(123, 44, 255, 0.7);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "Poppins", sans-serif;
      }

      /* ── Background layers ── */
      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 40px 40px;
      }

      .bg-glow {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse 80% 60% at 50% 0%,
          rgba(123, 44, 255, 0.18) 0%,
          transparent 70%
        );
        animation: glowShift 6s ease-in-out infinite;
      }

      @keyframes glowShift {
        0%,
        100% {
          opacity: 0.7;
          transform: scaleY(1);
        }
        50% {
          opacity: 1;
          transform: scaleY(1.15);
        }
      }

      canvas#particles {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.7;
      }

      /* ── Viewport wrapper ── */
      .page {
        position: relative;
        z-index: 2;
        height: 100vh;
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-evenly;
        padding: clamp(12px, 2.5vh, 24px) 20px;
        text-align: center;
        gap: 0;
      }

      /* ── HERO ── */
      .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(4px, 1vh, 10px);
      }

      .logo-wrap {
        position: relative;
        width: clamp(72px, 13vh, 110px);
        height: clamp(72px, 13vh, 110px);
        margin-bottom: clamp(4px, 0.8vh, 8px);
        animation: float 4s ease-in-out infinite;
        flex-shrink: 0;
      }

      /* Spinning ring */
      .logo-wrap::before {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          var(--primary),
          var(--primary-light),
          transparent 60%,
          var(--primary)
        );
        animation: spin 3s linear infinite;
        z-index: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .logo-wrap img {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        background: #111;
        border: 2px solid rgba(0, 0, 0, 0.8);
        box-shadow: 0 0 28px rgba(123, 44, 255, 0.55);
        display: block;
      }

      /* Fallback monogram when img fails */
      .logo-wrap .monogram {
        display: none;
        position: absolute;
        inset: 3px;
        z-index: 1;
        border-radius: 50%;
        background: linear-gradient(135deg, #1a0533, #2d1060);
        align-items: center;
        justify-content: center;
        font-size: clamp(26px, 5vh, 42px);
        font-weight: 900;
        color: var(--primary-light);
        text-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
      }

      .hero-title {
        font-size: clamp(28px, 6vh, 52px);
        font-weight: 900;
        letter-spacing: 1px;
        line-height: 1;
        background: linear-gradient(135deg, #ffffff 40%, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero-sub {
        font-size: clamp(11px, 1.9vh, 15px);
        font-weight: 400;
        color: #999;
        max-width: 320px;
        line-height: 1.4;
      }

      .trust-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(123, 44, 255, 0.1);
        border: 1px solid rgba(123, 44, 255, 0.3);
        border-radius: 100px;
        padding: clamp(5px, 0.9vh, 8px) clamp(12px, 2vh, 18px);
        font-size: clamp(11px, 1.7vh, 13px);
        font-weight: 500;
        color: #ccc;
        margin-top: clamp(2px, 0.5vh, 6px);
      }

      .trust-badge .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 8px #22c55e;
        animation: blink 1.4s ease-in-out infinite;
        flex-shrink: 0;
      }

      .trust-badge strong {
        color: var(--primary-light);
        font-weight: 700;
      }

      /* ── STATS ── */
      .stats-row {
        display: flex;
        gap: 10px;
        width: 100%;
      }

      .stat-card {
        flex: 1;
        min-width: 0; /* prevents flex blowout */
        background: var(--card-bg);
        backdrop-filter: blur(14px);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 8px;
        transition:
          transform 0.3s ease,
          border-color 0.3s,
          box-shadow 0.3s;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
      }

      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 20%;
        right: 20%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--primary-light),
          transparent
        );
      }

      .stat-card:hover {
        transform: translateY(-4px);
        border-color: var(--primary-light);
        box-shadow: 0 10px 28px rgba(123, 44, 255, 0.2);
      }

      .stat-icon {
        width: 28px;
        height: 28px;
        flex-shrink: 0;
        filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.5));
      }

      .stat-icon svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .stat-num {
        font-size: clamp(18px, 4.5vw, 28px); /* vw-based so all 3 stay equal */
        font-weight: 800;
        line-height: 1;
        white-space: nowrap;
        background: linear-gradient(135deg, #fff, var(--primary-light));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .stat-lbl {
        font-size: clamp(8px, 2vw, 11px);
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        font-weight: 600;
        white-space: nowrap;
      }

      /* ── CTA ── */
      .cta-wrap {
        position: relative;
        display: inline-block;
      }

      .cta-halo {
        position: absolute;
        inset: -14px;
        border-radius: 100px;
        background: radial-gradient(
          ellipse,
          rgba(123, 44, 255, 0.35),
          transparent 70%
        );
        animation: halo 2.5s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes halo {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.08);
        }
      }

      .cta-btn {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 18px 52px;
        background: linear-gradient(135deg, #6d28d9, #7b2cff, #a855f7);
        background-size: 200% 200%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 100px;
        color: #fff;
        font-family: "Poppins", sans-serif;
        font-size: 17px;
        font-weight: 700;
        text-decoration: none;
        letter-spacing: 0.6px;
        cursor: pointer;
        overflow: hidden;
        box-shadow:
          0 0 32px rgba(123, 44, 255, 0.55),
          0 4px 20px rgba(0, 0, 0, 0.4);
        animation:
          pulseCta 2.8s ease-in-out infinite,
          gradMove 4s ease infinite;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      @keyframes pulseCta {
        0%,
        70%,
        100% {
          box-shadow:
            0 0 28px rgba(123, 44, 255, 0.5),
            0 4px 20px rgba(0, 0, 0, 0.4);
        }
        35% {
          box-shadow:
            0 0 60px rgba(168, 85, 247, 0.85),
            0 0 100px rgba(123, 44, 255, 0.3),
            0 4px 20px rgba(0, 0, 0, 0.4);
        }
      }

      @keyframes gradMove {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      .cta-btn:hover {
        transform: scale(1.04);
      }
      .cta-btn:active {
        transform: scale(0.97);
      }

      .cta-btn svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
        flex-shrink: 0;
      }

      .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: scale(0);
        animation: rippleAnim 0.55s linear;
        pointer-events: none;
      }

      @keyframes rippleAnim {
        to {
          transform: scale(5);
          opacity: 0;
        }
      }

      .cta-note {
        margin-top: clamp(5px, 0.8vh, 8px);
        font-size: clamp(10px, 1.4vh, 12px);
        color: rgba(255, 255, 255, 0.28);
        letter-spacing: 0.04em;
      }

      /* ── URGENCY / TIMER ── */
      .urgency {
        width: 100%;
      }

      .urgency-label {
        font-size: clamp(11px, 1.7vh, 13px);
        font-weight: 600;
        color: #fff;
        margin-bottom: clamp(6px, 1vh, 10px);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
      }

      .urgency-label .fire-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ef4444;
        box-shadow: 0 0 8px #ef4444;
        animation: blink 1s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .timer-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .t-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }

      .t-num {
        width: 64px;
        height: 64px;
        background: #060608;
        border: 1px solid var(--primary);
        border-radius: 12px;
        box-shadow:
          0 0 14px rgba(123, 44, 255, 0.3),
          inset 0 0 10px rgba(123, 44, 255, 0.07);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Poppins", sans-serif;
        font-size: 28px;
        font-weight: 800;
        color: var(--primary-light);
        text-shadow: 0 0 14px rgba(168, 85, 247, 0.65);
        letter-spacing: -1px;
      }

      .t-lbl {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
      }

      .t-sep {
        font-size: 28px;
        font-weight: 800;
        color: rgba(123, 44, 255, 0.55);
        padding-bottom: 20px;
        animation: blink 1s step-end infinite;
      }

      /* ── FOOTER ── */
      footer {
        font-size: clamp(9px, 1.3vh, 11px);
        color: rgba(255, 255, 255, 0.2);
      }

      /* ── Animations ── */
      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-8px) rotate(1.5deg);
        }
      }

      /* ── Fade-in on load ── */
      .fade-in {
        opacity: 0;
        transform: translateY(16px);
        animation: fadeUp 0.6s ease forwards;
      }
      .fade-in:nth-child(1) {
        animation-delay: 0.05s;
      }
      .fade-in:nth-child(2) {
        animation-delay: 0.15s;
      }
      .fade-in:nth-child(3) {
        animation-delay: 0.25s;
      }
      .fade-in:nth-child(4) {
        animation-delay: 0.35s;
      }
      .fade-in:nth-child(5) {
        animation-delay: 0.45s;
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ── Landscape / tiny screens ── */
      @media (max-height: 560px) {
        .logo-wrap {
          width: 58px;
          height: 58px;
        }
        .hero-sub {
          display: none;
        }
        .cta-note {
          display: none;
        }
        .stat-icon {
          display: none;
        }
      }

      /* ── Very narrow phones (< 360px) ── */
      @media (max-width: 359px) {
        .t-num {
          width: 54px;
          height: 54px;
          font-size: 22px;
        }
        .t-sep {
          font-size: 22px;
        }
        .stat-num {
          font-size: 16px;
        }
        .stat-lbl {
          font-size: 8px;
          letter-spacing: 0;
        }
      }
    </style>

    <script>
      /* ── Particles ── */
      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      const PARTICLE_COUNT = 55;
      let pts = [];

      function mkParticle() {
        return {
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.8 + 0.4,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          a: Math.random() * 0.5 + 0.15,
        };
      }

      for (let i = 0; i < PARTICLE_COUNT; i++) pts.push(mkParticle());

      let raf;
      function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const t = Date.now() * 0.001;
        pts.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
          const alpha = p.a * (0.5 + 0.5 * Math.sin(t + p.x * 0.01));
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(168,85,247,${alpha})`;
          ctx.fill();
        });
        raf = requestAnimationFrame(drawParticles);
      }
      drawParticles();

      /* ── Counter animation ── */
      function animCount(el, target, dur = 1600) {
        let start = null;
        const suffix =
          el.nextSibling && el.nextSibling.nodeValue === "+" ? "" : "";
        const step = (ts) => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / dur, 1);
          const val = Math.floor((1 - Math.pow(1 - p, 3)) * target);
          el.textContent = val >= 1000 ? val.toLocaleString() : val;
          if (p < 1) requestAnimationFrame(step);
          else el.textContent = target.toLocaleString();
        };
        requestAnimationFrame(step);
      }

      window.addEventListener("load", () => {
        document.querySelectorAll(".counter").forEach((el) => {
          animCount(el, parseInt(el.dataset.target));
        });
      });

      /* ── Ripple ── */
      document.getElementById("ctaBtn").addEventListener("click", function (e) {
        const r = document.createElement("span");
        r.classList.add("ripple");
        const rect = this.getBoundingClientRect();
        const sz = Math.max(rect.width, rect.height);
        r.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX - rect.left - sz / 2}px;top:${e.clientY - rect.top - sz / 2}px;`;
        this.appendChild(r);
        setTimeout(() => r.remove(), 600);
      });

      /* ── Countdown (persists per session) ── */
      const TIMER_KEY = "nisha_v2_end";
      function getEnd() {
        let v = sessionStorage.getItem(TIMER_KEY);
        if (!v || Date.now() > +v) {
          v = Date.now() + (5 * 3600 + 47 * 60 + 22) * 1000;
          sessionStorage.setItem(TIMER_KEY, v);
        }
        return +v;
      }
      const endTime = getEnd();
      const pad = (n) => String(n).padStart(2, "0");
      const hEl = document.getElementById("t-h");
      const mEl = document.getElementById("t-m");
      const sEl = document.getElementById("t-s");

      function tick() {
        const diff = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;
        hEl.textContent = pad(h);
        mEl.textContent = pad(m);
        sEl.textContent = pad(s);
      }
      tick();
      setInterval(tick, 1000);
    </script>
  </body>
</html>
